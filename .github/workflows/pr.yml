name: Pr

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build ./src/index.tsx --outdir dist --target bun --external "@opencode-ai/plugin" --external "@opencode-ai/sdk" --external "solid-js" --external "@opentui/core" --external "@opentui/solid"
